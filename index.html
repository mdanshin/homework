<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff7ed">
  <title>Домашние задания</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <div class="topbar">
        <a class="brand" href="./" aria-label="Домашние задания">
          <span class="brand-mark">ДЗ</span>
          <span>Homework</span>
        </a>
        <span class="status-chip" data-status>Загрузка</span>
      </div>

      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow" data-today>Задания дня</p>
        <h1 id="page-title">Домашние задания</h1>
        <p class="hero-text">
          По 3 задачи по математике, русскому и английскому. Реши всё за один заход,
          получи оценку и отправь родителю ссылку-отчёт.
        </p>
      </section>
    </header>

    <div id="app" class="app-shell" aria-live="polite">
      <section class="loading-card">
        <span class="spinner" aria-hidden="true"></span>
        <p>Загружаю задания...</p>
      </section>
    </div>
  </main>
</body>
</html>
